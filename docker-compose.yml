services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: dev
      DB_PASSWORD: "1234"
      DB_NAME: DevDB
      ENVIRONMENT: production
      CREATE_DATABASE: "true"
      CREATE_DB_TABLES: "true"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: DevDB
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: "1234"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d DevDB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
